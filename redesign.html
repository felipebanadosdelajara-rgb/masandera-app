<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Masandera — Gestión de Pedidos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Palette — warm luxury */
      --bg: #F0EBE1;
      --bg-deep: #E8E1D4;
      --surface: #FDFBF7;
      --surface-alt: #F7F3EC;
      --surface-hover: #F2EDE4;

      --ink: #1A1612;
      --ink-mid: #5C5347;
      --ink-light: #9B8E7E;
      --ink-faint: #C4B9A8;

      --primary: #8B4513;
      --primary-hover: #6D350F;
      --primary-light: #F3E8DC;
      --primary-faint: #FAF5EF;

      --accent-gold: #A67C2E;
      --accent-gold-light: #FBF3E0;

      --success: #3D6B4E;
      --success-light: #E7F2EB;
      --success-bg: #D4E8DA;

      --warning: #8B6914;
      --warning-light: #FEF8E8;

      --danger: #8B2E1E;
      --danger-light: #FCEAE6;

      --info: #2C5F8A;
      --info-light: #E6F0F8;

      --border: #DDD5C7;
      --border-light: #EAE4D9;
      --border-strong: #C4B9A8;

      --shadow-sm: 0 1px 2px rgba(26,22,18,0.04), 0 1px 4px rgba(26,22,18,0.03);
      --shadow: 0 2px 8px rgba(26,22,18,0.06), 0 1px 2px rgba(26,22,18,0.04);
      --shadow-md: 0 4px 16px rgba(26,22,18,0.08), 0 2px 4px rgba(26,22,18,0.04);
      --shadow-lg: 0 8px 32px rgba(26,22,18,0.10), 0 4px 8px rgba(26,22,18,0.05);

      --radius: 10px;
      --radius-sm: 6px;
      --radius-lg: 14px;
      --radius-xl: 20px;

      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Outfit', system-ui, sans-serif;

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Grain texture overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    h1, h2, h3, h4 { font-family: var(--font-display); line-height: 1.2; font-weight: 600; }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--ink-light); }

    /* ===== ICONS (inline SVG helpers via CSS) ===== */
    .icon { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; flex-shrink: 0; }
    .icon svg { width: 100%; height: 100%; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
    .icon-sm svg { width: 16px; height: 16px; }
    .icon-lg { width: 24px; height: 24px; }

    /* ===== LOGIN ===== */
    .login-scene {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(160deg, #E8E1D4 0%, #F0EBE1 40%, #F5F0E8 100%);
      position: relative;
    }
    .login-scene::before {
      content: '';
      position: absolute;
      top: -20%;
      right: -10%;
      width: 60%;
      height: 80%;
      background: radial-gradient(ellipse, rgba(139,69,19,0.04) 0%, transparent 70%);
      pointer-events: none;
    }
    .login-card {
      background: var(--surface);
      border-radius: var(--radius-xl);
      padding: 56px 44px 44px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
      position: relative;
      border: 1px solid var(--border-light);
    }
    .login-brand { text-align: center; margin-bottom: 40px; }
    .login-brand-icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 4px 12px rgba(139,69,19,0.2);
    }
    .login-brand-icon svg { width: 28px; height: 28px; stroke: #FDFBF7; fill: none; stroke-width: 1.5; }
    .login-brand-name {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.02em;
    }
    .login-brand-sub {
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-light);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-mid);
      margin-bottom: 6px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--ink);
      background: var(--surface);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .form-input::placeholder { color: var(--ink-faint); }
    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(139,69,19,0.08);
    }
    .form-select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--ink);
      background: var(--surface);
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .form-select:focus { border-color: var(--primary); }
    .form-textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--ink);
      background: var(--surface);
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-textarea:focus { border-color: var(--primary); }
    .login-error {
      font-size: 13px;
      color: var(--danger);
      background: var(--danger-light);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s var(--ease-out);
      line-height: 1;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--primary);
      color: #FDFBF7;
    }
    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(139,69,19,0.2);
    }
    .btn-full { width: 100%; justify-content: center; padding: 14px 20px; }
    .btn-ghost {
      background: transparent;
      color: var(--ink-mid);
      padding: 8px 14px;
    }
    .btn-ghost:hover { background: var(--surface-hover); color: var(--ink); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { background: #2F5A3E; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #6E2418; }
    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--ink-mid);
    }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-faint); }

    /* Demo credentials */
    .demo-section {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border-light);
    }
    .demo-section h4 {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      color: var(--ink-light);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }
    .demo-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 4px;
    }
    .demo-item:hover { background: var(--surface-alt); }
    .demo-role {
      font-weight: 600;
      font-size: 13px;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .demo-email { font-size: 12px; color: var(--ink-light); margin-top: 1px; }
    .demo-pass { font-size: 11px; color: var(--ink-faint); font-family: monospace; }

    /* ===== APP SHELL ===== */
    .app-shell { min-height: 100vh; display: flex; flex-direction: column; }

    /* Topbar */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border-light);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 3px rgba(26,22,18,0.03);
    }
    .topbar-left { display: flex; align-items: center; gap: 24px; }
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topbar-logo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .topbar-logo svg { width: 18px; height: 18px; stroke: #FDFBF7; fill: none; stroke-width: 1.5; }
    .topbar-brand-text {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.02em;
    }
    .topbar-divider {
      width: 1px;
      height: 28px;
      background: var(--border);
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .user-info {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
    }
    .user-name { font-size: 13px; font-weight: 600; color: var(--ink); }
    .user-role {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--primary);
    }
    .btn-logout {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      background: transparent;
      border: 1.5px solid var(--border);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-light);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-light); }

    /* Main content */
    .main-content { padding: 32px; max-width: 1280px; margin: 0 auto; width: 100%; }

    /* Page header */
    .page-head {
      margin-bottom: 28px;
    }
    .page-head h2 {
      font-size: 28px;
      color: var(--ink);
      letter-spacing: -0.02em;
    }
    .page-head p {
      font-size: 14px;
      color: var(--ink-light);
      margin-top: 4px;
    }

    /* ===== KPI CARDS ===== */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 20px 24px;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s var(--ease-out), box-shadow 0.3s var(--ease-out);
    }
    .kpi-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
      border-radius: 0 2px 2px 0;
    }
    .kpi-card--primary::before { background: var(--primary); }
    .kpi-card--success::before { background: var(--success); }
    .kpi-card--warning::before { background: var(--accent-gold); }
    .kpi-card--info::before { background: var(--info); }

    .kpi-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .kpi-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ink-light);
    }
    .kpi-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .kpi-icon svg { width: 18px; height: 18px; stroke-width: 1.75; fill: none; }
    .kpi-icon--primary { background: var(--primary-light); color: var(--primary); }
    .kpi-icon--success { background: var(--success-light); color: var(--success); }
    .kpi-icon--warning { background: var(--accent-gold-light); color: var(--accent-gold); }
    .kpi-icon--info { background: var(--info-light); color: var(--info); }

    .kpi-value {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .kpi-sub {
      font-size: 12px;
      color: var(--ink-light);
      margin-top: 6px;
    }

    /* ===== TABS ===== */
    .tab-bar {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 24px;
      position: relative;
      overflow-x: auto;
    }
    .tab-item {
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-light);
      background: none;
      border: none;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
      white-space: nowrap;
      font-family: var(--font-body);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .tab-item:hover { color: var(--ink-mid); }
    .tab-item.active {
      color: var(--primary);
      font-weight: 600;
    }
    .tab-item.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 12px;
      right: 12px;
      height: 2px;
      background: var(--primary);
      border-radius: 2px 2px 0 0;
      animation: tabSlide 0.3s var(--ease-out);
    }
    @keyframes tabSlide {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }
    .tab-item svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
    .tab-badge {
      background: var(--primary);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
      line-height: 1.4;
    }

    /* ===== ORDER CARDS ===== */
    .order-grid { display: flex; flex-direction: column; gap: 12px; }
    .order-card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 20px 24px;
      transition: transform 0.2s var(--ease-out), box-shadow 0.2s var(--ease-out), border-color 0.2s;
      cursor: pointer;
    }
    .order-card:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow);
      border-color: var(--border);
    }
    .order-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .order-id {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
    }
    .order-client { font-size: 13px; color: var(--ink-mid); margin-top: 2px; }
    .order-date { font-size: 12px; color: var(--ink-light); margin-top: 2px; }

    /* Status badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .badge svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .badge--enviado { background: var(--info-light); color: var(--info); }
    .badge--aprobado { background: var(--success-light); color: var(--success); }
    .badge--rechazado { background: var(--danger-light); color: var(--danger); }
    .badge--produccion { background: var(--warning-light); color: var(--warning); }
    .badge--facturado { background: var(--primary-light); color: var(--primary); }
    .badge--borrador { background: var(--surface-alt); color: var(--ink-light); }

    .order-items {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }
    .item-pill {
      background: var(--surface-alt);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      color: var(--ink-mid);
      font-weight: 500;
    }
    .order-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 14px;
      border-top: 1px solid var(--border-light);
    }
    .order-total {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      color: var(--ink);
    }
    .order-dispatch {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--ink-light);
    }
    .order-dispatch svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
    .order-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* ===== TABLES ===== */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .data-table thead th {
      text-align: left;
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-light);
      border-bottom: 2px solid var(--border);
      background: var(--surface-alt);
    }
    .data-table tbody tr {
      border-bottom: 1px solid var(--border-light);
      transition: background 0.15s;
    }
    .data-table tbody tr:nth-child(even) { background: var(--surface-alt); }
    .data-table tbody tr:hover { background: var(--primary-faint); }
    .data-table tbody td {
      padding: 12px 16px;
      color: var(--ink-mid);
      vertical-align: middle;
    }
    .data-table tbody td:first-child { font-weight: 600; color: var(--ink); }
    .data-table .td-right { text-align: right; }

    /* ===== DISPATCH GROUP (Production Plan) ===== */
    .dispatch-block {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .dispatch-head {
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface-alt);
      border-bottom: 1px solid var(--border-light);
    }
    .dispatch-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      color: var(--ink);
    }
    .dispatch-meta { font-size: 12px; color: var(--ink-light); margin-top: 2px; }
    .dispatch-body { padding: 0; }
    .plan-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 2fr;
      gap: 8px;
      padding: 12px 24px;
      align-items: center;
      border-bottom: 1px solid var(--border-light);
      font-size: 13px;
    }
    .plan-row:last-child { border-bottom: none; }
    .plan-row.plan-header {
      background: var(--surface);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-light);
      padding: 10px 24px;
      position: sticky;
      top: 0;
    }
    .plan-product { font-weight: 600; color: var(--ink); }
    .plan-qty {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
    }
    .plan-cat {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      display: inline-block;
    }
    .cat-mm { background: #EDE7D9; color: #6B5C3E; }
    .cat-brioche { background: #F3E8DC; color: #8B4513; }
    .plan-clients { font-size: 12px; color: var(--ink-light); }

    /* ===== SECTION CARD ===== */
    .section-card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .section-card-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-card-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 600;
      color: var(--ink);
    }
    .section-card-body { padding: 0; }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }
    .empty-state-icon {
      width: 48px; height: 48px;
      margin: 0 auto 16px;
      color: var(--ink-faint);
    }
    .empty-state-icon svg { width: 100%; height: 100%; stroke: currentColor; fill: none; stroke-width: 1.25; }
    .empty-state h3 { font-size: 20px; color: var(--ink); margin-bottom: 4px; }
    .empty-state p { font-size: 13px; color: var(--ink-light); }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26,22,18,0.4);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: fadeIn 0.2s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-panel {
      background: var(--surface);
      border-radius: var(--radius-lg);
      max-width: 560px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: modalUp 0.3s var(--ease-out);
    }
    @keyframes modalUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .modal-head {
      padding: 24px 28px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    .modal-head h3 {
      font-size: 22px;
      font-weight: 700;
    }
    .modal-close {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--surface-alt);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-light);
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .modal-close:hover { background: var(--danger-light); color: var(--danger); }
    .modal-close svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }
    .modal-body { padding: 24px 28px; }
    .modal-section { margin-bottom: 24px; }
    .modal-section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ink-light);
      margin-bottom: 10px;
    }
    .modal-info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border-light);
      font-size: 13px;
    }
    .modal-info-row:last-child { border-bottom: none; }
    .modal-info-label { color: var(--ink-light); }
    .modal-info-value { font-weight: 600; color: var(--ink); }
    .modal-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .modal-item:last-child { border-bottom: none; }
    .modal-item-name { font-weight: 600; font-size: 13px; color: var(--ink); }
    .modal-item-detail { font-size: 12px; color: var(--ink-light); }
    .modal-item-price { font-weight: 700; font-family: var(--font-display); font-size: 16px; color: var(--ink); }
    .modal-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0 0;
      margin-top: 8px;
      border-top: 2px solid var(--ink);
    }
    .modal-total-label { font-size: 14px; font-weight: 600; color: var(--ink); }
    .modal-total-value { font-family: var(--font-display); font-size: 26px; font-weight: 700; color: var(--primary); }
    .modal-footer {
      padding: 16px 28px 24px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* ===== NOTIFICATION TOAST ===== */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 14px 20px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 2000;
      animation: toastIn 0.4s var(--ease-spring);
      box-shadow: var(--shadow-lg);
    }
    .toast svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; flex-shrink: 0; }
    .toast--success { background: var(--success); color: #fff; }
    .toast--error { background: var(--danger); color: #fff; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(16px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

    /* ===== DASHBOARD (CSS-only charts) ===== */
    .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .dash-grid--wide { grid-template-columns: 2fr 1fr; }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 24px;
    }
    .chart-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .chart-sub { font-size: 12px; color: var(--ink-light); margin-bottom: 20px; }

    .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 180px; padding-top: 8px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
    .bar-fill {
      width: 100%;
      border-radius: 4px 4px 0 0;
      transition: height 0.8s var(--ease-out);
      position: relative;
      min-height: 2px;
    }
    .bar-fill--primary { background: var(--primary); }
    .bar-fill--success { background: var(--success); }
    .bar-fill--gold { background: var(--accent-gold); }
    .bar-label { font-size: 10px; color: var(--ink-light); text-align: center; white-space: nowrap; }
    .bar-value { font-size: 10px; font-weight: 600; color: var(--ink-mid); }

    /* Horizontal bars */
    .hbar-chart { display: flex; flex-direction: column; gap: 10px; }
    .hbar-row { display: flex; align-items: center; gap: 12px; }
    .hbar-label { width: 100px; font-size: 12px; font-weight: 600; color: var(--ink); text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hbar-track { flex: 1; height: 24px; background: var(--surface-alt); border-radius: 4px; overflow: hidden; }
    .hbar-fill { height: 100%; border-radius: 4px; transition: width 0.8s var(--ease-out); display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; }
    .hbar-val { font-size: 10px; font-weight: 700; color: #fff; }

    .donut-wrap { display: flex; align-items: center; gap: 24px; }
    .donut-svg { width: 140px; height: 140px; flex-shrink: 0; }
    .donut-legend { display: flex; flex-direction: column; gap: 8px; }
    .donut-leg-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .donut-leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .donut-leg-val { font-weight: 700; margin-left: auto; font-family: var(--font-display); font-size: 16px; }

    /* ===== CLIENT VIEW ===== */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .product-card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 16px 18px;
      transition: all 0.2s var(--ease-out);
    }
    .product-card:hover { border-color: var(--border); box-shadow: var(--shadow-sm); }
    .product-card.has-qty { border-color: var(--primary); background: var(--primary-faint); }
    .product-name { font-weight: 600; font-size: 13px; color: var(--ink); }
    .product-unit { font-size: 11px; color: var(--ink-light); }
    .product-desc { font-size: 12px; color: var(--ink-light); margin: 6px 0 10px; }
    .product-footer { display: flex; justify-content: space-between; align-items: center; }
    .product-price {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      color: var(--primary);
    }
    .product-price span { font-family: var(--font-body); font-size: 11px; color: var(--ink-light); font-weight: 400; }
    .qty-ctrl { display: flex; align-items: center; gap: 0; }
    .qty-btn {
      width: 28px;
      height: 28px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-mid);
      transition: all 0.15s;
      font-family: var(--font-body);
    }
    .qty-btn:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
    .qty-btn:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
    .qty-btn:hover { background: var(--surface-alt); color: var(--ink); }
    .qty-input {
      width: 40px;
      height: 28px;
      border: 1.5px solid var(--border);
      border-left: none;
      border-right: none;
      text-align: center;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      background: var(--surface);
      outline: none;
      -moz-appearance: textfield;
    }
    .qty-input::-webkit-inner-spin-button { display: none; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ink-light);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-light);
    }

    .order-summary-panel {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 24px;
      position: sticky;
      top: 80px;
    }
    .summary-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .summary-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border-light);
      font-size: 13px;
    }
    .summary-item-name { font-weight: 600; color: var(--ink); }
    .summary-item-qty { font-size: 12px; color: var(--ink-light); }
    .summary-item-price { font-weight: 700; color: var(--ink); }
    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0 0;
      margin-top: 8px;
      border-top: 2px solid var(--ink);
    }
    .summary-total-label { font-weight: 600; font-size: 14px; }
    .summary-total-value { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--primary); }

    .order-panel-layout { display: grid; grid-template-columns: 1fr 340px; gap: 24px; align-items: start; }

    /* Notification banner */
    .notif-banner {
      background: var(--success-light);
      border: 1px solid var(--success);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 16px;
    }
    .notif-banner-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .notif-banner-title { font-size: 13px; font-weight: 600; color: var(--success); display: flex; align-items: center; gap: 6px; }
    .notif-item {
      background: var(--surface);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }
    .notif-item-time { font-size: 11px; color: var(--ink-light); }

    /* Alert box */
    .alert-box {
      background: var(--accent-gold-light);
      border: 1px solid rgba(166,124,46,0.2);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      font-size: 13px;
      color: var(--warning);
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 24px;
    }
    .alert-box svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.75; flex-shrink: 0; margin-top: 1px; }

    /* Create user form */
    .create-form {
      background: var(--surface);
      border: 2px solid var(--primary-light);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
    }
    .create-form h3 {
      font-size: 18px;
      margin-bottom: 20px;
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* Role badges for user table */
    .role-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .role--gerente { background: var(--primary-light); color: var(--primary); }
    .role--produccion { background: var(--accent-gold-light); color: var(--accent-gold); }
    .role--cliente { background: var(--info-light); color: var(--info); }

    .status-dot {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-dot::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
    }
    .status-dot--active::before { background: var(--success); }
    .status-dot--inactive::before { background: var(--danger); }
    .status-dot--active { color: var(--success); }
    .status-dot--inactive { color: var(--danger); }

    /* ===== ANIMATIONS ===== */
    @keyframes countUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .kpi-value { animation: countUp 0.5s var(--ease-out) both; }
    .kpi-card:nth-child(1) .kpi-value { animation-delay: 0s; }
    .kpi-card:nth-child(2) .kpi-value { animation-delay: 0.08s; }
    .kpi-card:nth-child(3) .kpi-value { animation-delay: 0.16s; }
    .kpi-card:nth-child(4) .kpi-value { animation-delay: 0.24s; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1024px) {
      .kpi-row { grid-template-columns: repeat(2, 1fr); }
      .dash-grid, .dash-grid--wide { grid-template-columns: 1fr; }
      .order-panel-layout { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .topbar { padding: 0 16px; }
      .main-content { padding: 16px; }
      .kpi-row { grid-template-columns: 1fr; }
      .tab-bar { padding: 0 4px; }
      .tab-item { padding: 10px 14px; font-size: 12px; }
      .plan-row { grid-template-columns: 1fr 1fr; }
      .plan-row .plan-clients { grid-column: 1 / -1; }
      .form-grid { grid-template-columns: 1fr; }
      .product-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  function simpleHash(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = ((hash << 5) - hash) + str.charCodeAt(i);
      hash |= 0;
    }
    return 'h_' + Math.abs(hash).toString(36);
  }

  function getPrecio(cId, pId) {
    // 1. Precio especial por cliente
    const p = DATA.precios.find(x => x.cId === cId && x.pId === pId);
    if (p) return p.v;
    // 2. Precio de lista del producto (para clientes nuevos sin precio especial)
    const prod = DATA.productos.find(x => x.id === pId);
    if (prod && prod.precioLista) return prod.precioLista;
    return 0;
  }
  function getProductosActivos() {
    return DATA.productos.filter(p => p.activo !== false);
  }
  function getProductosCliente(clienteId) {
    // Returns only active products assigned to this client
    const cliente = getCliente(clienteId);
    if (!cliente || !cliente.productosAsignados) return getProductosActivos();
    return getProductosActivos().filter(p => cliente.productosAsignados.includes(p.id));
  }
  function getSubCliente(distribuidorId, subClienteId) {
    const dist = getCliente(distribuidorId);
    if (!dist || !dist.subClientes) return null;
    return dist.subClientes.find(sc => sc.id === subClienteId);
  }
  function getProductosSubCliente(distribuidorId, subClienteId) {
    const sc = getSubCliente(distribuidorId, subClienteId);
    if (!sc || !sc.productosAsignados) return getProductosCliente(distribuidorId);
    return getProductosActivos().filter(p => sc.productosAsignados.includes(p.id));
  }
  function getCliente(id) { return DATA.clientes.find(c => c.id === id); }
  function getProducto(id) { return DATA.productos.find(p => p.id === id); }
  function fmt(n) { return new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP'}).format(n); }
  function fmtDate(d) {
    if (!d) return '—';
    const [y,m,day] = d.split('-');
    const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    const dt = new Date(y,parseInt(m)-1,parseInt(day));
    return `${dias[dt.getDay()]} ${parseInt(day)} ${meses[parseInt(m)-1]}`;
  }
  function todayStr() { return new Date().toISOString().split('T')[0]; }
  function getNextDespachos() {
    const today = new Date();
    const options = [];
    for (let i = 1; i <= 21 && options.length < 6; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() + i);
      if ([1,2,3,4,5,6].includes(d.getDay())) {
        options.push(d.toISOString().split('T')[0]);
      }
    }
    return options;
  }

  function renderPlanProduccion(activos) {
    if (!activos.length) return `<div class="empty-state"><div class="empty-state-icon">${ICON.clipboardList}</div><h3>Sin pedidos aprobados</h3><p>Aprueba pedidos para generar el plan de producción.</p></div>`;

    const byDate = {};
    activos.forEach(p => { if (!byDate[p.fechaDespacho]) byDate[p.fechaDespacho] = []; byDate[p.fechaDespacho].push(p); });
    const dateKeys = Object.keys(byDate).sort();

    return `
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-bottom:16px;">
      <button class="btn btn-outline btn-sm" onclick="window.print()">${icon('printer')} Imprimir</button>
    </div>
    ${dateKeys.map(fecha => {
      const peds = byDate[fecha];
      const consolidated = {};
      peds.forEach(p => p.items.forEach(item => {
        if (!consolidated[item.pId]) consolidated[item.pId] = { total:0, clientes:[] };
        consolidated[item.pId].total += item.qty;
        const c = getCliente(p.clienteId);
        consolidated[item.pId].clientes.push(`${c?c.nombre:'?'} ×${item.qty}`);
      }));
      const prodIds = Object.keys(consolidated);
      const totalUds = prodIds.reduce((s,id) => s + consolidated[id].total, 0);
      return `<div class="dispatch-block">
        <div class="dispatch-head">
          <div>
            <div class="dispatch-title">Despacho ${fmtDate(fecha)}</div>
            <div class="dispatch-meta">${peds.length} pedido(s) — ${totalUds} unidades totales</div>
          </div>
          ${statusBadge('aprobado')}
        </div>
        <div class="dispatch-body">
          <div class="plan-row plan-header"><span>Producto</span><span>Categoría</span><span>Unidades</span><span>Clientes</span></div>
          ${prodIds.map(pId => {
            const prod = getProducto(pId);
            const data = consolidated[pId];
            return `<div class="plan-row">
              <span class="plan-product">${prod?prod.nombre:'?'}</span>
              <span><span class="plan-cat ${prod&&prod.categoria==='brioche'?'cat-brioche':'cat-mm'}">${prod&&prod.categoria==='brioche'?'Brioche':'Masa Madre'}</span></span>
              <span class="plan-qty">${data.total}</span>
              <span class="plan-clients">${data.clientes.join(', ')}</span>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}`;
  }

  function exportarDefontana() {
    const porFacturar = PEDIDOS.filter(p => p.status === 'aprobado');
    if (!porFacturar.length) return;

    const IVA = 0.19;
    const BOM = '\uFEFF';
    const cols = [
      'N° Pedido','Fecha Despacho','Razón Social','RUT','Giro',
      'Dirección','Ciudad','SKU','Descripción Producto','Categoría',
      'Unidad','Cantidad','Precio Unitario Neto','Total Neto','IVA 19%','Total con IVA',
      'Sub-cliente','Observaciones'
    ];

    const rows = [];
    porFacturar.forEach(p => {
      const c = getCliente(p.clienteId);
      // Resolve who the invoice is for
      let razonSocial = c?.razonSocial || c?.nombre || '';
      let rut = c?.rut || '';
      let giro = c?.giro || '';
      let direccion = c?.direccion || '';
      let ciudad = c?.ciudad || '';

      if (p.subClienteId && p.subClienteId !== '__self__') {
        const sc = getSubCliente(p.clienteId, p.subClienteId);
        if (sc) {
          razonSocial = sc.razonSocial || sc.nombre || razonSocial;
          rut = sc.rut || rut;
          giro = sc.giro || giro;
          direccion = sc.direccion || direccion;
          ciudad = sc.ciudad || ciudad;
        }
      }

      p.items.forEach(item => {
        const prod = getProducto(item.pId);
        const totalNeto = item.qty * item.price;
        const ivaAmt = Math.round(totalNeto * IVA);
        rows.push([
          p.id,
          p.fechaDespacho,
          razonSocial,
          rut,
          giro,
          direccion,
          ciudad,
          prod?.sku || '',
          prod?.nombre || '',
          prod?.categoria === 'brioche' ? 'Brioche' : 'Masa Madre',
          prod?.unidad || 'unidad',
          item.qty,
          item.price,
          totalNeto,
          ivaAmt,
          totalNeto + ivaAmt,
          p.subClienteNombre || '',
          p.obs || ''
        ]);
      });
    });

    const escape = v => {
      const s = String(v ?? '');
      return s.includes(',') || s.includes('"') || s.includes('\n') ? '"' + s.replace(/"/g, '""') + '"' : s;
    };

    const csv = BOM + [cols, ...rows].map(r => r.map(escape).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `LaMasandera_Defontana_${todayStr()}.csv`;
    a.click(); URL.revokeObjectURL(url);
    showNotif('success', `Exportados ${porFacturar.length} pedidos para Defontana.`);
  }

  function exportarHistorialFacturado() {
    const facturados = PEDIDOS.filter(p => p.status === 'facturado');
    if (!facturados.length) { showNotif('error', 'Sin historial para exportar.'); return; }

    const IVA = 0.19;
    const BOM = '\uFEFF';
    const cols = ['N° Pedido','Folio DTE','Fecha Factura','Fecha Despacho','Razón Social','RUT','Neto','IVA','Total con IVA'];
    const rows = facturados.map(p => {
      const c = getCliente(p.clienteId);
      const iva = Math.round(p.total * IVA);
      return [p.id, p.folio||'', p.fechaFacturacion||'', p.fechaDespacho, c?.razonSocial||c?.nombre||'', c?.rut||'', p.total, iva, p.total+iva];
    });

    const escape = v => { const s = String(v??''); return s.includes(',')||s.includes('"') ? '"'+s.replace(/"/g,'""')+'"' : s; };
    const csv = BOM + [cols,...rows].map(r=>r.map(escape).join(',')).join('\n');
    const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=`LaMasandera_HistorialFacturado_${todayStr()}.csv`;
    a.click(); URL.revokeObjectURL(url);
    showNotif('success', `Historial de ${facturados.length} pedidos exportado.`);
  }

  function renderProductAssignment() {
    const clienteId = STATE.assigningProductsTo;
    // Check if it's a sub-client (format: "cX:scY")
    const parts = clienteId.split(':');
    let clienteName, assigned, priceTargetCId;
    if (parts.length === 2) {
      const dist = getCliente(parts[0]);
      const sc = dist?.subClientes?.find(s => s.id === parts[1]);
      clienteName = sc ? `${sc.nombre} (de ${dist.nombre})` : '?';
      assigned = sc?.productosAsignados || [];
      priceTargetCId = parts[0] + ':' + parts[1]; // sub-client pricing key
    } else {
      const cl = getCliente(clienteId);
      clienteName = cl ? cl.nombre : '?';
      assigned = cl?.productosAsignados || [];
      priceTargetCId = clienteId;
    }
    const allProducts = getProductosActivos();
    const tipos = [...new Set(allProducts.map(p => p.tipo))];

    return `
    <div class="create-form" style="margin-bottom:24px;border-color:var(--accent-gold)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
        <div>
          <h3>Asignar Productos y Precios — ${clienteName}</h3>
          <p style="font-size:12px;color:var(--ink-light);margin-top:4px">${assigned.length} producto(s) asignados. Puedes editar el precio especial de cada producto. Si no se define, se usará el precio de lista.</p>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="STATE.assigningProductsTo=null;render();">${icon('x')}</button>
      </div>
      ${tipos.map(tipo => {
        const prods = allProducts.filter(p => p.tipo === tipo);
        return `
        <div style="margin-bottom:16px">
          <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-light);margin-bottom:8px">${tipo}</div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:8px">
            ${prods.map(p => {
              const isAssigned = assigned.includes(p.id);
              const realCId = parts.length===2 ? parts[0] : clienteId;
              const precioEspecial = DATA.precios.find(x => x.cId === realCId && x.pId === p.id);
              return `
              <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius-sm);border:1.5px solid ${isAssigned?'var(--primary)':'var(--border-light)'};background:${isAssigned?'var(--primary-faint)':'var(--surface)'};transition:all 0.15s">
                <div style="width:18px;height:18px;border-radius:4px;border:2px solid ${isAssigned?'var(--primary)':'var(--border)'};background:${isAssigned?'var(--primary)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer" onclick="toggleProductAssignment('${clienteId}','${p.id}')">
                  ${isAssigned ? '<svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:#fff;fill:none;stroke-width:3"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
                </div>
                <div style="flex:1;min-width:0;cursor:pointer" onclick="toggleProductAssignment('${clienteId}','${p.id}')">
                  <div style="font-size:13px;font-weight:${isAssigned?'600':'400'};color:var(--ink)">${p.nombre}</div>
                  <div style="font-size:11px;color:var(--ink-light)">Lista: ${fmt(p.precioLista)}</div>
                </div>
                ${isAssigned ? `
                <div style="display:flex;align-items:center;gap:6px;flex-shrink:0" onclick="event.stopPropagation()">
                  <span style="font-size:11px;color:var(--ink-light);white-space:nowrap">Precio:</span>
                  <input type="number" class="form-input" style="width:90px;padding:4px 8px;font-size:13px;font-weight:600;text-align:right"
                    value="${precioEspecial ? precioEspecial.v : ''}"
                    placeholder="${p.precioLista}"
                    onchange="setSpecialPrice('${realCId}','${p.id}',this.value)"
                    onclick="event.stopPropagation()">
                </div>` : ''}
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
      <div style="display:flex;gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border-light)">
        <button class="btn btn-primary btn-sm" onclick="STATE.assigningProductsTo=null;render();">${icon('check')} Listo</button>
        <span style="font-size:12px;color:var(--ink-light);display:flex;align-items:center">${assigned.length} productos asignados</span>
      </div>
    </div>`;
  }

  function setSpecialPrice(clienteId, productId, value) {
    const v = parseInt(value);
    const existing = DATA.precios.findIndex(x => x.cId === clienteId && x.pId === productId);
    if (!v || v <= 0 || isNaN(v)) {
      // Remove special price — will fallback to list price
      if (existing >= 0) DATA.precios.splice(existing, 1);
    } else {
      if (existing >= 0) {
        DATA.precios[existing].v = v;
      } else {
        DATA.precios.push({ cId: clienteId, pId: productId, v: v });
      }
    }
    // No re-render needed, input keeps value
  }

  function openClientForm() { STATE.showClientForm = true; STATE.editingClientId = null; render(); }
  function editClient(id) { STATE.showClientForm = true; STATE.editingClientId = id; render(); }
  function closeClientForm() { STATE.showClientForm = false; STATE.editingClientId = null; render(); }

  function saveClient() {
    const nombre = document.getElementById('clientNombre')?.value.trim();
    const tipo = document.getElementById('clientTipo')?.value;
    const rubro = document.getElementById('clientRubro')?.value.trim();
    const contacto = document.getElementById('clientContacto')?.value.trim();
    const telefono = document.getElementById('clientTelefono')?.value.trim();
    const direccion = document.getElementById('clientDireccion')?.value.trim();
    const ciudad = document.getElementById('clientCiudad')?.value.trim();
    const razonSocial = document.getElementById('clientRazonSocial')?.value.trim();
    const rut = document.getElementById('clientRut')?.value.trim();
    const giro = document.getElementById('clientGiro')?.value.trim();
    const email = document.getElementById('clientEmail')?.value.trim().toLowerCase();
    const pass = document.getElementById('clientPass')?.value;

    if (!nombre) { showNotif('error', 'El nombre del cliente es obligatorio.'); return; }
    if (!rubro) { showNotif('error', 'El rubro es obligatorio.'); return; }
    if (!contacto) { showNotif('error', 'La persona de contacto es obligatoria.'); return; }

    // Add new rubro if it doesn't exist
    if (rubro && !DATA.rubros.includes(rubro)) DATA.rubros.push(rubro);

    if (STATE.editingClientId) {
      const cl = DATA.clientes.find(c => c.id === STATE.editingClientId);
      if (cl) {
        cl.nombre = nombre; cl.tipo = tipo; cl.rubro = rubro;
        cl.contacto = contacto; cl.telefono = telefono;
        cl.direccion = direccion; cl.ciudad = ciudad;
        cl.razonSocial = razonSocial; cl.rut = rut; cl.giro = giro;
        if (tipo === 'distribuidor' && !cl.subClientes) cl.subClientes = [];
      }
      // Update or create user account
      const existingUser = DATA.usuarios.find(u => u.clienteId === STATE.editingClientId);
      if (existingUser) {
        if (email) existingUser.email = email;
        existingUser.nombre = contacto || nombre;
        if (pass) existingUser.pass = simpleHash(pass);
      } else if (email && pass) {
        DATA.usuarios.push({
          id: 'u' + (DATA.usuarios.length + 1),
          nombre: contacto || nombre, email, pass: simpleHash(pass),
          rol: 'cliente', clienteId: STATE.editingClientId, activo: true
        });
      }
      STATE.showClientForm = false; STATE.editingClientId = null;
      showNotif('success', `Cliente "${nombre}" actualizado.`);
    } else {
      if (DATA.clientes.some(c => c.nombre.toLowerCase() === nombre.toLowerCase())) {
        showNotif('error', `Ya existe un cliente con el nombre "${nombre}".`); return;
      }
      if (!email) { showNotif('error', 'El correo electrónico es obligatorio para crear el acceso.'); return; }
      if (!pass) { showNotif('error', 'La contraseña es obligatoria para crear el acceso.'); return; }
      if (DATA.usuarios.some(u => u.email.toLowerCase() === email)) {
        showNotif('error', `Ya existe un usuario con el correo "${email}".`); return;
      }

      const newId = 'c' + (++clienteCounter);
      const newClient = {
        id: newId, nombre, razonSocial, rut, giro, tipo, rubro,
        contacto, telefono, direccion, ciudad,
        productosAsignados: [], activo: true
      };
      if (tipo === 'distribuidor') newClient.subClientes = [];
      DATA.clientes.push(newClient);

      // Create user account automatically
      DATA.usuarios.push({
        id: 'u' + (DATA.usuarios.length + 1),
        nombre: contacto || nombre, email, pass: simpleHash(pass),
        rol: 'cliente', clienteId: newId, activo: true
      });

      STATE.showClientForm = false;
      showNotif('success', `Cliente "${nombre}" creado con acceso: ${email}. Asígnale productos desde la tabla.`);
    }
  }

  function toggleClient(id, activate) {
    const cl = DATA.clientes.find(c => c.id === id);
    if (cl) {
      cl.activo = activate;
      showNotif(activate ? 'success' : 'error',
        activate ? `"${cl.nombre}" activado.` : `"${cl.nombre}" desactivado.`);

  function openSubClientProducts(distId, scId) {
    STATE.assigningProductsTo = distId + ':' + scId;
    render();
  }

  function toggleProductAssignment(targetId, productId) {
    const parts = targetId.split(':');
    let assigned;
    if (parts.length === 2) {
      const dist = getCliente(parts[0]);
      const sc = dist?.subClientes?.find(s => s.id === parts[1]);
      if (!sc) return;
      assigned = sc.productosAsignados || (sc.productosAsignados = []);
    } else {
      const cl = getCliente(targetId);
      if (!cl) return;
      assigned = cl.productosAsignados || (cl.productosAsignados = []);
    }
    const idx = assigned.indexOf(productId);
    if (idx >= 0) assigned.splice(idx, 1);
    else assigned.push(productId);
    render();
  }

    const direccion = document.getElementById('scDireccion')?.value.trim();
    const ciudad = document.getElementById('scCiudad')?.value.trim();
    const razonSocial = document.getElementById('scRazonSocial')?.value.trim();
    const rut = document.getElementById('scRut')?.value.trim();
    const giro = document.getElementById('scGiro')?.value.trim();

    if (!nombre) { showNotif('error', 'El nombre del sub-cliente es obligatorio.'); return; }
    if (rubro && !DATA.rubros.includes(rubro)) DATA.rubros.push(rubro);

    if (STATE.editingSubClientId) {
      const sc = dist.subClientes.find(s => s.id === STATE.editingSubClientId);
      if (sc) {

        sc.razonSocial = razonSocial; sc.rut = rut; sc.giro = giro;

      showNotif('success', `Sub-cliente "${nombre}" actualizado.`);
    } else {
      dist.subClientes.push({
        id: 'sc' + (++subClienteCounter),

        telefono, direccion, ciudad,

  // ============================================================
  // PRODUCTOS — Administración de catálogo (solo Gerente)
  // ============================================================
  let productoCounter = 30;

  function generateSKU(categoria, tipo) {
    const catCode = categoria === 'brioche' ? 'BR' : 'MM';
    // Take first 3 uppercase letters of tipo, remove accents
    const tipoClean = tipo.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase();
    const tipoCode = tipoClean.substring(0, 3).padEnd(3, 'X');
    // Find next number for this prefix
    const prefix = catCode + '-' + tipoCode + '-';
    const existing = DATA.productos
      .filter(p => p.sku && p.sku.startsWith(prefix))
      .map(p => parseInt(p.sku.split('-')[2]) || 0);
    const next = existing.length > 0 ? Math.max(...existing) + 1 : 1;
    return prefix + String(next).padStart(3, '0');
  }

  function renderProductos() {
    const tipos = [...new Set(DATA.productos.map(p => p.tipo))];
    const { productFilter, productCatFilter } = STATE;

    let filtered = [...DATA.productos];
    if (productFilter !== 'all') filtered = filtered.filter(p => p.tipo === productFilter);
    if (productCatFilter !== 'all') filtered = filtered.filter(p => p.categoria === productCatFilter);
    // Sort: active first, then by tipo, then by nombre
    filtered.sort((a,b) => {
      if (a.activo !== false && b.activo === false) return -1;
      if (a.activo === false && b.activo !== false) return 1;
      if (a.tipo < b.tipo) return -1;
      if (a.tipo > b.tipo) return 1;
      return a.nombre.localeCompare(b.nombre);
    });

    const activos = DATA.productos.filter(p => p.activo !== false).length;
    const inactivos = DATA.productos.length - activos;

    return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" onclick="openProductForm()">${icon('plus')} Nuevo Producto</button>

          <span style="font-size:12px;color:var(--ink-light)">Categoría:</span>
          <select class="form-select" style="width:auto;padding:6px 12px;font-size:12px" onchange="STATE.productCatFilter=this.value;render()">
            <option value="all" ${productCatFilter==='all'?'selected':''}>Todas</option>
            <option value="masa_madre" ${productCatFilter==='masa_madre'?'selected':''}>Masa Madre</option>
            <option value="brioche" ${productCatFilter==='brioche'?'selected':''}>Brioche</option>
          </select>
        </div>
      </div>
      <div style="font-size:12px;color:var(--ink-light)">
        ${activos} activos · ${inactivos} inactivos · ${DATA.productos.length} total
      </div>
    </div>

    ${STATE.showProductForm ? renderProductForm() : ''}

    <div class="section-card">
      <div class="section-card-body">
        <table class="data-table">
          <thead><tr>
            <th>SKU</th>
            <th>Producto</th>
            <th>Tipo</th>
            <th>Categoría</th>
            <th>Unidad</th>
            <th class="td-right">Precio de Lista</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr></thead>
          <tbody>${filtered.map(p => `
            <tr style="${p.activo===false?'opacity:0.5':''}">
              <td style="font-family:monospace;font-size:12px;color:var(--ink-light);white-space:nowrap">${p.sku||'—'}</td>
              <td>${p.nombre}</td>
              <td style="font-weight:400">${p.tipo}</td>
              <td><span class="plan-cat ${p.categoria==='brioche'?'cat-brioche':'cat-mm'}">${p.categoria==='brioche'?'Brioche':'Masa Madre'}</span></td>
              <td style="font-weight:400;color:var(--ink-light)">${p.unidad}</td>
              <td class="td-right" style="font-family:var(--font-display);font-size:16px;font-weight:700">${fmt(p.precioLista||0)}</td>
              <td><span class="status-dot ${p.activo!==false?'status-dot--active':'status-dot--inactive'}">${p.activo!==false?'Activo':'Inactivo'}</span></td>
              <td>
                <div style="display:flex;gap:6px">
                  <button class="btn btn-ghost btn-sm" onclick="editProduct('${p.id}')" title="Editar">${icon('edit')}</button>
                  ${p.activo !== false
                    ? `<button class="btn btn-ghost btn-sm" onclick="toggleProduct('${p.id}',false)" title="Desactivar" style="color:var(--danger)">${icon('xCircle')}</button>`
                    : `<button class="btn btn-ghost btn-sm" onclick="toggleProduct('${p.id}',true)" title="Activar" style="color:var(--success)">${icon('checkCircle')}</button>`
                  }
                </div>
              </td>
            </tr>
          `).join('')}</tbody>
        </table>
      </div>
    </div>`;
  }

      </div>
      <div style="display:flex;gap:10px;margin-top:16px">
        <button class="btn btn-primary btn-sm" onclick="saveProduct()">${icon(isEditing?'check':'plus')} ${isEditing?'Guardar Cambios':'Crear Producto'}</button>

  function openProductForm() {
    STATE.showProductForm = true;
    STATE.editingProductId = null;
