  function editProduct(id) {
    STATE.showProductForm = true;
    STATE.editingProductId = id;
    render();
  }

  function closeProductForm() {
    STATE.showProductForm = false;
    STATE.editingProductId = null;
    render();
  }

  function saveProduct() {
    const nombre = document.getElementById('prodNombre')?.value.trim();
    const tipo = document.getElementById('prodTipo')?.value.trim();
    const categoria = document.getElementById('prodCategoria')?.value;
    const unidad = document.getElementById('prodUnidad')?.value;
    const precioLista = parseInt(document.getElementById('prodPrecio')?.value) || 0;

    if (!nombre) { showNotif('error', 'El nombre del producto es obligatorio.'); return; }
    if (!tipo) { showNotif('error', 'El tipo de producto es obligatorio.'); return; }
    if (precioLista <= 0) { showNotif('error', 'El precio de lista debe ser mayor a cero.'); return; }

    if (STATE.editingProductId) {
      // Editing existing product
      const prod = DATA.productos.find(p => p.id === STATE.editingProductId);
      if (prod) {
        prod.nombre = nombre;
        prod.tipo = tipo;
        prod.categoria = categoria;
        prod.unidad = unidad;
        prod.precioLista = precioLista;
        const activoVal = document.getElementById('prodActivo')?.value;
        if (activoVal !== undefined) prod.activo = activoVal === 'true';
      }
      STATE.showProductForm = false;
      STATE.editingProductId = null;
      showNotif('success', `Producto "${nombre}" actualizado.`);
    } else {
      // Check for duplicate name
      if (DATA.productos.some(p => p.nombre.toLowerCase() === nombre.toLowerCase())) {
        showNotif('error', `Ya existe un producto con el nombre "${nombre}".`);
        return;
      }
      // Creating new product with auto-generated SKU
      const newId = 'p' + (++productoCounter);
      const sku = generateSKU(categoria, tipo);
      DATA.productos.push({
        id: newId,
        sku,
        nombre,
        tipo,
        categoria,
        unidad,
        precioLista,
        activo: true
      });
      STATE.showProductForm = false;
      showNotif('success', `Producto "${nombre}" creado · SKU: ${sku} · ${fmt(precioLista)}.`);
    }
  }

  function toggleProduct(id, activate) {
    const prod = DATA.productos.find(p => p.id === id);
    if (prod) {
      prod.activo = activate;
      showNotif(activate ? 'success' : 'error',
        activate ? `"${prod.nombre}" activado.` : `"${prod.nombre}" desactivado. Ya no aparecerá en el catálogo de clientes.`
      );
    }
  }

  // ============================================================
  // PRODUCCION VIEW
  // ============================================================
  function renderProduccion() {
    const activos = PEDIDOS.filter(p => ['aprobado','en_produccion'].includes(p.status));
    return `
    <div class="page-head"><h2>Plan de Producción</h2><p>Vista consolidada del plan de producción del día.</p></div>
    ${renderPlanProduccion(activos)}`;
  }

  // ============================================================
  // ============================================================
  // FACTURADOR VIEW
  // ============================================================
  function renderFacturador() {
    const porFacturar = PEDIDOS.filter(p => p.status === 'aprobado')
      .sort((a,b) => a.fechaDespacho.localeCompare(b.fechaDespacho));
    const historial = PEDIDOS.filter(p => p.status === 'facturado')
      .sort((a,b) => b.fechaFacturacion?.localeCompare(a.fechaFacturacion));

    const tabs = [
      { label:'Pendientes', icon:'receipt', badge: porFacturar.length || 0 },
      { label:'Historial', icon:'history' },
    ];

    return `
    <div class="page-head">
      <h2>Facturación</h2>
      <p>Ingresa el folio DTE de cada pedido una vez emitida la factura en Defontana.</p>
    </div>
    <div class="tab-bar">
      ${tabs.map((t,i) => `<button class="tab-item ${STATE.tab===i?'active':''}" onclick="setTab(${i})">
        ${ICON[t.icon]||''} ${t.label}
        ${t.badge ? `<span class="tab-badge">${t.badge}</span>` : ''}
      </button>`).join('')}
    </div>
    ${STATE.tab === 0 ? renderFacturadorPendientes(porFacturar) : renderFacturadorHistorial(historial)}`;
  }

  function renderFacturadorPendientes(pedidos) {
    if (pedidos.length === 0) return `
      <div class="empty-state">
        <div class="empty-state-icon">${ICON.check}</div>
        <h3>Sin pedidos pendientes</h3>
        <p>Todos los pedidos aprobados han sido facturados. Buen trabajo.</p>
      </div>`;

    const totalNeto = pedidos.reduce((s,p) => s + p.total, 0);
    const totalConIva = Math.round(totalNeto * 1.19);

    return `
    <div style="display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap">
      <div class="kpi-card" style="flex:1;min-width:160px">
        <div class="kpi-label">Pedidos pendientes</div>
        <div class="kpi-value" data-count="${pedidos.length}">${pedidos.length}</div>
      </div>
      <div class="kpi-card" style="flex:1;min-width:160px">
        <div class="kpi-label">Total neto</div>
        <div class="kpi-value">${fmt(totalNeto)}</div>
      </div>
      <div class="kpi-card" style="flex:1;min-width:160px">
        <div class="kpi-label">Total con IVA</div>
        <div class="kpi-value">${fmt(totalConIva)}</div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:16px">
      ${pedidos.map(p => {
        const c = getCliente(p.clienteId);
        const iva = Math.round(p.total * 0.19);
        const totalConIva = p.total + iva;
        // Resolve who to invoice
        let razonSocial = c?.razonSocial || c?.nombre || '—';
        let rut = c?.rut || '';
        let giro = c?.giro || '—';
        let direccion = c?.direccion || '—';
        let ciudad = c?.ciudad || '';
        if (p.subClienteId && p.subClienteId !== '__self__') {
          const sc = getSubCliente(p.clienteId, p.subClienteId);
          if (sc) {
            razonSocial = sc.razonSocial || sc.nombre || razonSocial;
            rut = sc.rut || rut;
            giro = sc.giro || giro;
            direccion = sc.direccion || direccion;
            ciudad = sc.ciudad || ciudad;
          }
        }
        return `
        <div class="card" style="padding:24px;border-left:4px solid var(--accent-gold)">
          <!-- Cabecera pedido -->
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:16px">
            <div>
              <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-light)">Pedido</div>
              <div style="font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--primary)">${p.id}</div>
              <div style="font-size:12px;color:var(--ink-light);margin-top:2px">${icon('truck')} Despacho: <strong>${fmtDate(p.fechaDespacho)}</strong></div>
              ${p.subClienteNombre ? `<div style="font-size:12px;color:var(--accent-gold);margin-top:2px">${icon('building')} ${p.subClienteNombre}</div>` : ''}
            </div>
            <div style="text-align:right">
              <div style="font-size:11px;color:var(--ink-light)">Total neto</div>
              <div style="font-family:var(--font-display);font-size:24px;font-weight:700">${fmt(p.total)}</div>
              <div style="font-size:12px;color:var(--ink-light)">+ IVA: ${fmt(iva)} → <strong>${fmt(totalConIva)}</strong></div>
            </div>
          </div>

          <!-- Datos tributarios -->
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:16px;background:var(--surface);border-radius:var(--radius-sm);margin-bottom:16px">
            <div>
              <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--ink-light);margin-bottom:3px">Razón Social</div>
              <div style="font-size:13px;font-weight:600">${razonSocial}</div>
            </div>
            <div>
              <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--ink-light);margin-bottom:3px">RUT</div>
              <div style="font-size:13px;font-weight:600;font-family:monospace">${rut || `<span style="color:var(--danger)">Sin RUT</span>`}</div>
            </div>
            <div>
              <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--ink-light);margin-bottom:3px">Giro</div>
              <div style="font-size:13px">${giro}</div>
            </div>
            <div>
              <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--ink-light);margin-bottom:3px">Dirección</div>
              <div style="font-size:13px">${direccion}${ciudad ? ', '+ciudad : ''}</div>
            </div>
          </div>

          <!-- Detalle productos -->
          <table class="data-table" style="margin-bottom:16px">
            <thead><tr>
              <th>SKU</th><th>Producto</th><th>Cant.</th>
              <th class="td-right">P. Unitario Neto</th>
              <th class="td-right">Total Neto</th>
            </tr></thead>
            <tbody>
              ${p.items.map(item => {
                const prod = getProducto(item.pId);
                return `<tr>
                  <td style="font-family:monospace;font-size:12px;color:var(--ink-light)">${prod?.sku||'—'}</td>
                  <td style="font-weight:600">${prod?.nombre||'?'}</td>
                  <td>${item.qty} ${prod?.unidad||''}</td>
                  <td class="td-right">${fmt(item.price)}</td>
                  <td class="td-right" style="font-weight:700">${fmt(item.qty * item.price)}</td>
                </tr>`;
              }).join('')}
              <tr style="background:var(--surface)">
                <td colspan="3"></td>
                <td class="td-right" style="font-size:12px;color:var(--ink-light)">Neto<br>IVA 19%<br><strong>Total</strong></td>
                <td class="td-right">
                  ${fmt(p.total)}<br>
                  <span style="color:var(--ink-light)">${fmt(iva)}</span><br>
                  <strong style="font-family:var(--font-display);font-size:16px">${fmt(totalConIva)}</strong>
                </td>
              </tr>
            </tbody>
          </table>

          ${p.obs ? `<div style="font-size:12px;color:var(--ink-light);margin-bottom:16px">${icon('info')} Obs: ${p.obs}</div>` : ''}

          <!-- Folio + acción -->
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding-top:16px;border-top:1px solid var(--border-light)">
            <div style="flex:1;min-width:220px">
              <label class="form-label" style="margin-bottom:6px">${icon('receipt')} Folio DTE emitido en Defontana</label>
              <input class="form-input" type="text" id="folio-${p.id}"
                placeholder="Ej: 00001234"
                value="${p.folio||''}"
                onchange="PEDIDOS.find(x=>x.id==='${p.id}').folio=this.value"
                style="font-family:monospace;font-size:14px;font-weight:700;letter-spacing:0.05em">
            </div>
            <button class="btn btn-primary" style="align-self:flex-end" onclick="marcarFacturadoDesdeFacturador('${p.id}')">
              ${icon('check')} Marcar como Facturado
            </button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  function renderFacturadorHistorial(pedidos) {
    if (!pedidos.length) return `
      <div class="empty-state">
        <div class="empty-state-icon">${ICON.history}</div>
        <h3>Sin historial</h3>
        <p>Los pedidos facturados aparecerán aquí.</p>
      </div>`;

    const totalNeto = pedidos.reduce((s,p) => s + p.total, 0);
    return `
    <div style="margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
      <span style="font-size:13px;color:var(--ink-light)">${pedidos.length} pedidos facturados · Total neto: <strong>${fmt(totalNeto)}</strong> · Con IVA: <strong>${fmt(Math.round(totalNeto*1.19))}</strong></span>
    </div>
    <div class="section-card">
      <div class="section-card-body">
        <table class="data-table">
          <thead><tr>
            <th>Pedido</th><th>Folio DTE</th><th>Razón Social</th><th>RUT</th>
            <th>Fecha Factura</th><th>Despacho</th>
            <th class="td-right">Neto</th><th class="td-right">Total c/IVA</th>
          </tr></thead>
          <tbody>
            ${pedidos.map(p => {
              const c = getCliente(p.clienteId);
              let razonSocial = c?.razonSocial || c?.nombre || '—';
              let rut = c?.rut || '—';
              if (p.subClienteId && p.subClienteId !== '__self__') {
                const sc = getSubCliente(p.clienteId, p.subClienteId);
                if (sc?.razonSocial) { razonSocial = sc.razonSocial; rut = sc.rut||rut; }
              }
              const iva = Math.round(p.total * 0.19);
              return `<tr>
                <td style="font-weight:600">${p.id}</td>
                <td style="font-family:monospace;font-weight:700;color:var(--primary)">${p.folio||'—'}</td>
                <td>${razonSocial}</td>
                <td style="font-family:monospace;font-size:12px">${rut}</td>
                <td>${fmtDate(p.fechaFacturacion)}</td>
                <td>${fmtDate(p.fechaDespacho)}</td>
                <td class="td-right">${fmt(p.total)}</td>
                <td class="td-right" style="font-weight:700">${fmt(p.total+iva)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  }

  function marcarFacturadoDesdeFacturador(id) {
    const p = PEDIDOS.find(x => x.id === id);
    if (!p) return;
    const folioInput = document.getElementById('folio-' + id);
    if (folioInput?.value) p.folio = folioInput.value.trim();
    p.status = 'facturado';
    p.fechaFacturacion = todayStr();
    const folioMsg = p.folio ? ` · Folio ${p.folio}` : ' · (sin folio ingresado)';
    showNotif('success', `Pedido ${id} facturado${folioMsg}.`);
  }

  // CLIENTE VIEW
  // ============================================================
  function renderCliente() {
    const cliente = getCliente(STATE.user.clienteId);
    const misPedidos = PEDIDOS.filter(p => p.clienteId === STATE.user.clienteId).sort((a,b) => b.id.localeCompare(a.id));
    const tabs = [
      { label:'Nuevo Pedido', icon:'plus' },
      { label:'Mis Pedidos', icon:'package', badge: misPedidos.filter(p=>p.status==='enviado').length || 0 },
    ];
    return `
    <div class="page-head">
      <h2>Bienvenido, ${cliente?cliente.nombre:''}</h2>
      <p>Realiza tus pedidos y consulta el estado de cada despacho.</p>
    </div>
    <div class="tab-bar">
      ${tabs.map((t,i) => `<button class="tab-item ${STATE.tab===i?'active':''}" onclick="setTab(${i})">${ICON[t.icon]||''} ${t.label} ${t.badge?`<span class="tab-badge">${t.badge}</span>`:''}</button>`).join('')}
    </div>
    ${STATE.tab === 0 ? renderNuevoPedido() : renderMisPedidos(misPedidos)}`;
  }

  function renderNuevoPedido() {
    // Determine which client we're ordering for
    const cliente = getCliente(STATE.user.clienteId);
    const isDistribuidor = cliente && cliente.tipo === 'distribuidor';
    let targetClienteId = STATE.user.clienteId;
    let targetSubClienteId = null;

    if (isDistribuidor && STATE.selectedSubClientId) {
      targetSubClienteId = STATE.selectedSubClientId;
    }

    // Get products for this client (or sub-client if distributor)
    let productos;
    if (isDistribuidor && targetSubClienteId && targetSubClienteId !== '__self__') {
      productos = getProductosSubCliente(STATE.user.clienteId, targetSubClienteId);
    } else {
      productos = getProductosCliente(STATE.user.clienteId);
    }

    const tipos = [...new Set(productos.map(p => p.tipo))];
    const despachos = getNextDespachos();
    const draftItems = Object.entries(STATE.draft).filter(([,q]) => q > 0);
    const total = draftItems.reduce((s,[id,q]) => s + q * getPrecio(targetClienteId, id), 0);
    if (!STATE.draftFecha && despachos.length) STATE.draftFecha = despachos[0];

    // Distributor must select sub-client first (or "self")
    if (isDistribuidor && !targetSubClienteId) {
      const subClientes = (cliente.subClientes || []);
      return `
      <div class="alert-box">${icon('info')} <span>Como distribuidor, selecciona el destinatario del pedido.</span></div>
      <div class="card" style="padding:32px;max-width:600px;margin:24px auto;">
        <div class="section-label" style="margin-bottom:16px;">¿Para quién es este pedido?</div>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <button class="btn btn-ghost" style="text-align:left;padding:16px 20px;border:2px solid var(--primary);border-radius:10px;display:flex;justify-content:space-between;align-items:center;background:var(--primary-faint)" onclick="STATE.selectedSubClientId='__self__';STATE.draft={};render();">
            <div>
              <div style="font-weight:700;font-size:15px;color:var(--primary)">${icon('package')} Para mí — ${cliente.nombre}</div>
              <div style="font-size:13px;color:var(--ink-light)">${cliente.rubro || ''} · Pedido propio del distribuidor</div>
            </div>
            <div style="color:var(--primary)">${icon('chevRight')}</div>
          </button>
          ${subClientes.length > 0 ? `
            <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-light);margin:8px 0 0 0">Sub-clientes</div>
            ${subClientes.map(sc => `
              <button class="btn btn-ghost" style="text-align:left;padding:16px 20px;border:1.5px solid var(--border);border-radius:10px;display:flex;justify-content:space-between;align-items:center;" onclick="STATE.selectedSubClientId='${sc.id}';STATE.draft={};render();">
                <div>
                  <div style="font-weight:700;font-size:15px;color:var(--ink)">${sc.nombre}</div>
                  <div style="font-size:13px;color:var(--ink-light)">${sc.rubro || ''} ${sc.contacto ? '· '+sc.contacto : ''}</div>
                </div>
                <div style="color:var(--ink-light)">${icon('chevRight')}</div>
              </button>
            `).join('')}` : ''}
        </div>
        <div style="margin-top:16px;font-size:13px;color:var(--ink-light)">
          ${icon('mapPin')} Despacho a: <strong>${cliente.direccion || 'Sin dirección'}, ${cliente.ciudad || ''}</strong>
        </div>
      </div>`;
    }

    // Sub-client header for distributor
    const subClienteHeader = isDistribuidor && targetSubClienteId ? (() => {
      const isSelf = targetSubClienteId === '__self__';
      const sc = isSelf ? null : getSubCliente(STATE.user.clienteId, targetSubClienteId);
      const label = isSelf ? `${cliente.nombre} (pedido propio)` : (sc?sc.nombre:'?');
      return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:12px 16px;background:var(--surface);border-radius:10px;border:1.5px solid var(--border)">
        <button class="btn btn-ghost btn-sm" onclick="STATE.selectedSubClientId=null;STATE.draft={};render();">${icon('arrowLeft')} Cambiar</button>
        <div style="font-weight:700;color:var(--ink)">Pedido para: ${label}</div>
        <div style="font-size:13px;color:var(--ink-light);margin-left:auto">${icon('mapPin')} Despacho a: ${cliente.direccion||''}</div>
      </div>`;
    })() : '';

    return `
    ${subClienteHeader}
    <div class="alert-box">${icon('info')} <span>Los pedidos enviados antes del <strong>viernes</strong> se despachan el martes o jueves. Los enviados el <strong>lunes</strong> se despachan el miércoles o viernes.</span></div>
    <div class="order-panel-layout">
      <div>
        ${tipos.map(tipo => {
          const prods = productos.filter(p => p.tipo === tipo);
          return `<div class="section-label">${tipo}</div>
          <div class="product-grid">${prods.map(p => {
            const price = getPrecio(targetClienteId, p.id);
            const qty = STATE.draft[p.id] || 0;
            return `<div class="product-card ${qty>0?'has-qty':''}">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
                <div><div class="product-name">${p.nombre}</div><div class="product-unit">${p.unidad}</div></div>
                <span class="plan-cat ${p.categoria==='brioche'?'cat-brioche':'cat-mm'}">${p.categoria==='brioche'?'Brioche':'Masa Madre'}</span>
              </div>
              <div class="product-footer">
                <div class="product-price">${fmt(price)} <span>/ ${p.unidad}</span></div>
                <div class="qty-ctrl">
                  <button class="qty-btn" onclick="changeQty('${p.id}',-1)">−</button>
                  <input class="qty-input" type="number" min="0" value="${qty}" onchange="setQty('${p.id}',this.value)">
                  <button class="qty-btn" onclick="changeQty('${p.id}',1)">+</button>
                </div>
              </div>
            </div>`;
          }).join('')}</div>`;
        }).join('')}
      </div>
      <div class="order-summary-panel">
        <div class="summary-title">Resumen del Pedido</div>
        ${draftItems.length === 0 ? `<div class="empty-state" style="padding:40px 0"><div class="empty-state-icon">${ICON.package}</div><p style="font-size:13px;color:var(--ink-light)">Agrega productos</p></div>` : `
          ${draftItems.map(([id,q]) => {
            const prod = getProducto(id);
            const price = getPrecio(targetClienteId, id);
            return `<div class="summary-item"><div><div class="summary-item-name">${prod?prod.nombre:'?'}</div><div class="summary-item-qty">${q} ${prod?prod.unidad:''}</div></div><div class="summary-item-price">${fmt(q*price)}</div></div>`;
          }).join('')}
          <div class="summary-total"><span class="summary-total-label">Total</span><span class="summary-total-value">${fmt(total)}</span></div>
        `}
        <div class="form-group" style="margin-top:20px">
          <label class="form-label">Fecha de despacho</label>
          <select class="form-select" id="draftFecha" onchange="STATE.draftFecha=this.value">
            ${despachos.map(d => `<option value="${d}" ${STATE.draftFecha===d?'selected':''}>${fmtDate(d)}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Observaciones</label>
          <textarea class="form-textarea" id="draftObs" placeholder="Ej: Entrega antes de las 8am…" onchange="STATE.draftObs=this.value">${STATE.draftObs}</textarea>
        </div>
        <button class="btn btn-primary btn-full" onclick="enviarPedido()" ${draftItems.length===0?'disabled style="opacity:.4;cursor:not-allowed"':''}>
          ${icon('send')} Enviar Pedido
        </button>
      </div>
    </div>`;
  }

  function renderMisPedidos(pedidos) {
    if (!pedidos.length) return `<div class="empty-state"><div class="empty-state-icon">${ICON.clipboardList}</div><h3>Sin pedidos aún</h3><p>Tu historial de pedidos aparecerá aquí.</p></div>`;

    const notifs = getMyNotifications();
    return `
    ${notifs.length > 0 ? `<div class="notif-banner">
      <div class="notif-banner-header">
        <span class="notif-banner-title">${icon('bell')} Notificaciones (${notifs.length})</span>
        <button class="btn btn-ghost btn-sm" onclick="STATE.notifications.forEach(n=>n.read=true);render();">Marcar leídas</button>
      </div>
      ${notifs.map(n => `<div class="notif-item"><div><span>${n.message}</span><div class="notif-item-time">${new Date(n.timestamp).toLocaleString('es-CL')}</div></div></div>`).join('')}
    </div>` : ''}
    <div class="order-grid">${pedidos.map(p => {
      const items = p.items.map(i => { const prod = getProducto(i.pId); return `<span class="item-pill">${prod?prod.nombre:'?'} ×${i.qty}</span>`; }).join('');
      return `<div class="order-card" onclick="openModal('${p.id}')">
        <div class="order-top">
          <div>
            <div class="order-id">${p.id}</div>
            <div class="order-date">Pedido del ${fmtDate(p.fechaPedido)}</div>
            ${p.subClienteNombre ? `<div style="font-size:12px;color:var(--ink-light);margin-top:2px">${icon('building')} ${p.subClienteNombre}</div>` : ''}
          </div>
          ${statusBadge(p.status)}
        </div>
        <div class="order-items">${items}</div>
        <div class="order-bottom">
          <div class="order-total">${fmt(p.total)}</div>
          <div class="order-actions">
            <div class="order-dispatch">${icon('truck')} ${fmtDate(p.fechaDespacho)}</div>
            <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();repetirPedido('${p.id}')">${icon('refreshCw')} Repetir</button>
          </div>
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  // ============================================================
  // MODAL
  // ============================================================
  function renderModal() {
    const p = PEDIDOS.find(x => x.id === STATE.modal);
    if (!p) return '';
    const cliente = getCliente(p.clienteId);

    return `
    <div class="modal-overlay" onclick="if(event.target===event.currentTarget){closeModal()}">
      <div class="modal-panel">
        <div class="modal-head">
          <div>
            <div style="font-size:12px;color:var(--ink-light);font-weight:600;margin-bottom:4px">${p.id}</div>
            <h3>${cliente?cliente.nombre:'Pedido'}</h3>
          </div>
          <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="modal-body">
          <div class="modal-section">
            <div class="modal-section-label">Información del pedido</div>
            <div class="modal-info-row"><span class="modal-info-label">Estado</span><span>${statusBadge(p.status)}</span></div>
            <div class="modal-info-row"><span class="modal-info-label">Fecha pedido</span><span class="modal-info-value">${fmtDate(p.fechaPedido)}</span></div>
            <div class="modal-info-row"><span class="modal-info-label">Fecha despacho</span><span class="modal-info-value">${fmtDate(p.fechaDespacho)}</span></div>
            ${p.fechaFacturacion ? `<div class="modal-info-row"><span class="modal-info-label">Facturación</span><span class="modal-info-value">${fmtDate(p.fechaFacturacion)}</span></div>` : ''}
            ${cliente ? `<div class="modal-info-row"><span class="modal-info-label">Ciudad</span><span class="modal-info-value">${cliente.ciudad}</span></div>` : ''}
          </div>
          <div class="modal-section">
            <div class="modal-section-label">Productos</div>
            ${p.items.map(item => {
              const prod = getProducto(item.pId);
              return `<div class="modal-item">
                <div><div class="modal-item-name">${prod?prod.nombre:'?'}</div><div class="modal-item-detail">${item.qty} ${prod?prod.unidad:''} × ${fmt(item.price)}</div></div>
                <div class="modal-item-price">${fmt(item.qty*item.price)}</div>
              </div>`;
            }).join('')}
            <div class="modal-total">
              <span class="modal-total-label">Total pedido</span>
              <span class="modal-total-value">${fmt(p.total)}</span>
            </div>
          </div>
          ${p.obs ? `<div class="modal-section"><div class="modal-section-label">Observaciones</div><div class="alert-box">${icon('info')} ${p.obs}</div></div>` : ''}
          ${p.obsGerente ? `<div class="modal-section"><div class="modal-section-label">Nota de gerencia</div><div style="background:var(--success-light);padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;color:var(--success)">${icon('checkCircle')} ${p.obsGerente}</div></div>` : ''}
        </div>
        <div class="modal-footer">
          ${STATE.user?.rol === 'gerente' && p.status === 'enviado' ? `
            <button class="btn btn-success" onclick="aprobarPedido('${p.id}')">${icon('check')} Aprobar</button>
            <button class="btn btn-danger" onclick="rechazarPedido('${p.id}')">${icon('x')} Rechazar</button>
          ` : ''}
          ${STATE.user?.rol === 'gerente' && ['aprobado','en_produccion'].includes(p.status) ? `
            <button class="btn btn-primary" onclick="marcarFacturado('${p.id}')">${icon('receipt')} Marcar Facturado</button>
          ` : ''}
          <button class="btn btn-outline" onclick="closeModal()">Cerrar</button>
        </div>
      </div>
    </div>`;
  }

  function renderToast() {
    if (!STATE.notif) return '';
    return `<div class="toast toast--${STATE.notif.type}">
      ${STATE.notif.type==='success' ? ICON.checkCircle : ICON.xCircle}
      ${STATE.notif.msg}
    </div>`;
  }

  // ============================================================
  // EVENT HANDLERS
  // ============================================================
  function bindEvents() {
    const form = document.getElementById('loginForm');
    if (form) form.addEventListener('submit', e => {
      e.preventDefault();
      doLogin(document.getElementById('loginEmail').value.trim().toLowerCase(), document.getElementById('loginPass').value);
    });
  }

  function doLogin(email, pass) {
    const user = DATA.usuarios.find(u => u.email.toLowerCase() === email && u.pass === simpleHash(pass));
    if (!user) { STATE.loginError = 'Correo o contraseña incorrectos.'; STATE.loginEmail = email; render(); return; }
    if (user.activo === false) { STATE.loginError = 'Tu cuenta ha sido desactivada.'; render(); return; }
    STATE.user = user; STATE.page = user.rol; STATE.tab = 0; STATE.loginError = ''; render();
  }
  function quickLogin(e,p) { doLogin(e,p); }
  function doLogout() { STATE.user = null; STATE.page = 'login'; STATE.tab = 0; STATE.draft = {}; STATE.selectedSubClientId = null; render(); }
  function setTab(i) { STATE.tab = i; render(); }
  function openModal(id) { STATE.modal = id; render(); }
  function closeModal() { STATE.modal = null; render(); }
  function showNotif(type, msg) {
    STATE.notif = { type, msg }; render();
    setTimeout(() => { STATE.notif = null; render(); }, 3500);
  }

  function changeQty(pId, delta) {
    STATE.draft[pId] = Math.max(0, (STATE.draft[pId]||0) + delta);
    render();
  }
  function setQty(pId, val) { STATE.draft[pId] = Math.max(0, parseInt(val)||0); }

  function enviarPedido() {
    const cliente = getCliente(STATE.user.clienteId);
    const isDistribuidor = cliente && cliente.tipo === 'distribuidor';
    const targetClienteId = STATE.user.clienteId;

    const items = Object.entries(STATE.draft).filter(([,q]) => q > 0).map(([pId,qty]) => ({pId,qty,price:getPrecio(targetClienteId,pId)}));
    if (!items.length) { showNotif('error','Agrega al menos un producto.'); return; }
    const fecha = STATE.draftFecha;
    if (!fecha) { showNotif('error','Selecciona una fecha de despacho.'); return; }
    const pedido = {
      id: 'ORD-0' + (pedidoCounter++), clienteId: STATE.user.clienteId, items, status:'enviado',
      fechaPedido: todayStr(), fechaDespacho: fecha,
      obs: document.getElementById('draftObs')?.value || '', obsGerente:'',
      total: items.reduce((s,i) => s + i.qty*i.price, 0)
    };
    // If distributor, record who the order is for
    if (isDistribuidor && STATE.selectedSubClientId) {
      if (STATE.selectedSubClientId === '__self__') {
        pedido.subClienteId = '__self__';
        pedido.subClienteNombre = cliente.nombre + ' (propio)';
      } else {
        pedido.subClienteId = STATE.selectedSubClientId;
        const sc = getSubCliente(STATE.user.clienteId, STATE.selectedSubClientId);
        pedido.subClienteNombre = sc ? sc.nombre : '';
      }
    }
    PEDIDOS.unshift(pedido);
    STATE.draft = {}; STATE.draftFecha = ''; STATE.draftObs = '';
    STATE.selectedSubClientId = null; STATE.tab = 1;
    showNotif('success', `Pedido ${pedido.id} enviado (${fmt(pedido.total)}).`);
  }

  function aprobarPedido(id) {
    const p = PEDIDOS.find(x => x.id === id);
    if (p) { p.status = 'aprobado'; p.obsGerente = 'Aprobado.'; }
    STATE.modal = null;
    showNotif('success', `Pedido ${id} aprobado.`);
  }
  function rechazarPedido(id) {
    const p = PEDIDOS.find(x => x.id === id);
    if (p) p.status = 'rechazado';
    STATE.modal = null;
    showNotif('error', `Pedido ${id} rechazado.`);
  }
  function marcarFacturado(id) {
    const p = PEDIDOS.find(x => x.id === id);
    if (p) {
      p.status = 'facturado';
      p.fechaFacturacion = todayStr();
      // Preserve folio if already entered
    }
    STATE.modal = null;
    const folioMsg = p?.folio ? ` · Folio ${p.folio}` : '';
    showNotif('success', `Pedido ${id} marcado como facturado${folioMsg}.`);
  }
  function repetirPedido(orderId) {
    const original = PEDIDOS.find(p => p.id === orderId);
    if (!original) return;
    STATE.draft = {};
    original.items.forEach(item => { STATE.draft[item.pId] = item.qty; });
    STATE.draftFecha = ''; STATE.draftObs = ''; STATE.tab = 0;
    showNotif('success', `Pedido ${orderId} cargado. Revisa cantidades y envía.`);
  }

  // ============================================================
  // ANIMATIONS
  // ============================================================
  function animateCounters() {
    document.querySelectorAll('.kpi-value[data-count]').forEach(el => {
      const target = parseInt(el.dataset.count);
      const isCurrency = el.dataset.format === 'currency';
      const duration = 800;
      const start = performance.now();
      function step(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = Math.round(target * eased);
        el.textContent = isCurrency ? fmt(current) : current.toLocaleString('es-CL');
        if (progress < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    });
  }

  function animateBars() {
    document.querySelectorAll('.bar-fill[data-height]').forEach(el => {
      el.style.height = el.dataset.height;
    });
    document.querySelectorAll('.hbar-fill[data-width]').forEach(el => {
      el.style.width = el.dataset.width;
    });
  }

  // ============================================================
  // INIT
  // ============================================================
  render();
  </script>
</body>
</html>
